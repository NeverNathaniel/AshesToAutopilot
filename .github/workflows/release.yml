name: Release

# Automated release pipeline: pushing a version tag (e.g. v1.2.0) builds the
# portable Windows exe and publishes it as a GitHub Release asset.
# Can also be run manually via the Actions tab against an existing tag.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish portable exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build portable exe
        run: npm run dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AshesToAutopilot-Portable-*.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
