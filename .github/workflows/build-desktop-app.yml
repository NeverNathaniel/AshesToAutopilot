name: Build Desktop App

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'app/**'
      - 'Scripts/**'
      - 'Start-PreWipeToolkit.ps1'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-desktop-app.yml'
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'app/**'
      - 'Scripts/**'
      - 'Start-PreWipeToolkit.ps1'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-desktop-app.yml'

permissions:
  contents: read

jobs:
  build:
    name: Build portable exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build portable exe
        run: npm run dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AshesToAutopilot-Portable
          path: dist/AshesToAutopilot-Portable-*.exe
          if-no-files-found: error
