name: PowerShell Syntax Check

on:
  push:
    paths:
      - '**.ps1'
  pull_request:
    paths:
      - '**.ps1'

jobs:
  validate:
    name: Lint PowerShell
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse syntax
        shell: pwsh
        run: |
          $failed = 0
          $passed = 0
          $scripts = Get-ChildItem -Path Scripts -Recurse -Filter "*.ps1"
          $scripts += Get-ChildItem -Path . -MaxDepth 1 -Filter "*.ps1"

          foreach ($script in $scripts) {
              $tokens = $null
              $errors = $null
              $null = [System.Management.Automation.Language.Parser]::ParseFile(
                  $script.FullName, [ref]$tokens, [ref]$errors)

              if ($errors.Count -gt 0) {
                  Write-Host "::error file=$($script.FullName)::FAIL: $($script.Name) - $($errors[0].Message) (line $($errors[0].Extent.StartLineNumber))"
                  $failed++
              } else {
                  Write-Host "PASS: $($script.Name)"
                  $passed++
              }
          }

          Write-Host ""
          Write-Host "Results: $passed passed, $failed failed out of $($passed + $failed) scripts"

          if ($failed -gt 0) {
              Write-Error "$failed script(s) have syntax errors"
              exit 1
          }

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
              Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -ErrorAction Stop
          }
          Import-Module PSScriptAnalyzer

          $results = @()
          $results += Invoke-ScriptAnalyzer -Path Scripts -Recurse -Severity @('Warning','Error')
          if (Test-Path 'Start-PreWipeToolkit.ps1') {
              $results += Invoke-ScriptAnalyzer -Path 'Start-PreWipeToolkit.ps1' -Severity @('Warning','Error')
          }

          $errors   = @($results | Where-Object Severity -eq 'Error')
          $warnings = @($results | Where-Object Severity -eq 'Warning')

          foreach ($r in $errors) {
              Write-Host "::error file=$($r.ScriptPath),line=$($r.Line)::[$($r.RuleName)] $($r.Message)"
          }
          foreach ($r in $warnings) {
              Write-Host "::warning file=$($r.ScriptPath),line=$($r.Line)::[$($r.RuleName)] $($r.Message)"
          }

          Write-Host ""
          Write-Host "PSScriptAnalyzer: $($errors.Count) error(s), $($warnings.Count) warning(s)"

          if ($errors.Count -gt 0) { exit 1 }
